<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Importa il font Playfair Display identico al titolo -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&amp;display=swap');
      .text-g {
        font-family: 'Playfair Display', serif;
        font-weight: 700;
        fill: #ffffff;
        font-size: 320px;
        text-anchor: middle;
        dominant-baseline: central;
      }
    </style>
    <!-- Gradiente coordinato con la parte alta del sito -->
    <linearGradient id="nightGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="60%" stop-color="#3b0764" />
      <stop offset="100%" stop-color="#a855f7" />
    </linearGradient>
    <!-- Un leggero effetto ombra per far risaltare la G -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.3" />
    </filter>
  </defs>
  
  <!-- Sfondo arrotondato stile App Icon moderna -->
  <rect width="512" height="512" rx="140" fill="url(#nightGrad)" />
  
  <!-- La lettera "G" centrata -->
  <text x="256" y="246" class="text-g" filter="url(#shadow)">G</text>
</svg>
