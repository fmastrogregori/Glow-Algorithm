<!DOCTYPE html>
<html lang="it">
<head>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glow-Algorithm | AI Skincare Experience</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Pulsanti di controllo principali -->
    <button id="sosBtn" onclick="toggleSOS()">SOS</button>
    <button id="langBtn" onclick="toggleLanguage()">EN</button>

    <header>
        <h1>Glow-Algorithm</h1>
        <p data-key="subtitle">Il tuo consulente di skincare digitale</p>
    </header>

    <div class="container">
        <div class="input-section">
            <div class="form-group">
                <label for="skinType" data-key="labelSkinType">1. Il tuo tipo di pelle</label>
                <select id="skinType">
                    <option value="grassa" data-key="optGrassa">Grassa / Oleosa</option>
                    <option value="secca" data-key="optSecca">Secca / Disidratata</option>
                    <option value="mista" data-key="optMista">Mista / Normale</option>
                </select>
            </div>

            <div class="form-group">
                <label for="concern" data-key="labelConcern">2. Preoccupazione principale</label>
                <select id="concern">
                    <option value="breakout" data-key="optBreakout">Breakout / Acne</option>
                    <option value="rossore" data-key="optRossore">Rossore / Sensibilità</option>
                    <option value="opacita" data-key="optOpacita">Colorito spento / Macchie</option>
                    <option value="invecchiamento" data-key="optInvecchiamento">Invecchiamento / Rughe</option>
                </select>
            </div>

            <div class="form-group">
                <label for="climate" data-key="labelClimate">3. Clima attuale</label>
                <select id="climate">
                    <option value="umido" data-key="optUmido">Caldo Umido / Inquinamento</option>
                    <option value="secco" data-key="optSecco">Freddo Secco / Vento</option>
                </select>
            </div>

            <button onclick="analyzeSkin()" id="submitBtn" data-key="btnAnalyze">Genera Analisi Digitale</button>
        </div>

        <div id="loader">
            <div class="spinner"></div>
            <p data-key="loaderText">Interrogando il database ingredienti...</p>
        </div>

        <div id="results">
            <div id="routineContent"></div>
        </div>
    </div>

    <div id="sosModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="toggleSOS()">&times;</span>
            <h2 data-key="sosTitle">Emergency Care SOS</h2>
            <p data-key="sosSubtitle">Seleziona l'emergenza per ricevere istruzioni immediate:</p>
            <div class="sos-options">
                <button onclick="getSOS('brufolo')" data-key="btnSosBrufolo">SOS Brufolo</button>
                <button onclick="getSOS('irritazione')" data-key="btnSosIrritazione">SOS Irritazione</button>
                <button onclick="getSOS('secchezza')" data-key="btnSosSecchezza">SOS Secchezza</button>
            </div>
            <div id="sosResult"></div>
        </div>
    </div>

    <div id="chat-container">
        <button id="chat-toggle" onclick="toggleChat()" data-key="btnChatToggle">Chiedi a Glowy!</button>
        
        <div id="chat-window">
            <div id="chat-header">
                <h3>Glowy Expert</h3>
                <span class="close-chat" onclick="toggleChat()">&times;</span>
            </div>
            
            <div id="chat-body">
                <div class="bot-msg" id="chatWelcomeMsg">Ciao! Sono Glowy. Hai dubbi sulla tua routine o su un ingrediente?</div>
            </div>
            
            <div id="chat-footer">
                <input type="text" id="chat-input" placeholder="Scrivi un messaggio..." onkeypress="if(event.key === 'Enter') sendMessage()">
                <button onclick="sendMessage()">➤</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>

<style>
    /* Effetto bagliore per rendere lo sfondo ancora più magico */
    body::before {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: url('https://www.transparenttextures.com/patterns/stardust.png');
        opacity: 0.15; /* Regola l'intensità delle micro-stelline */
        pointer-events: none;
        z-index: -1;
    }
</style>
</body>
</html>
